<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Sistema de Gerenciamento de Campeonatos'">Sistema de Gerenciamento de Campeonatos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar" th:fragment="menu">
    <a class="brand" th:href="@{/}">Sistema de Gerenciamento de Campeonatos</a>
    <nav class="nav">
        <a th:href="@{/campeonatos}">Campeonatos</a>
        <a th:href="@{/equipes}">Equipes</a>
        <a th:href="@{/partidas}">Partidas</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/usuarios}">Usuarios</a>
    </nav>
    <div class="session">
        <span sec:authentication="name">usuario</span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="link-button">Sair</button>
        </form>
    </div>
</header>
</body>
</html>
