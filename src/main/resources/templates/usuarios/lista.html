<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Usuarios')}"></head>
<body>
<header th:replace="~{fragments/layout :: menu}"></header>

<main class="page">
    <div class="page-title">
        <div>
            <h1>Usuarios</h1>
        </div>
        <a class="primary-button" th:href="@{/usuarios/novo}">Novo usuario</a>
    </div>

    <section class="table-panel">
        <table>
            <thead>
            <tr>
                <th>Nome</th>
                <th>Login</th>
                <th>Perfil</th>
                <th class="actions">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios.content}">
                <td th:text="${usuario.nome}">Usuario</td>
                <td th:text="${usuario.login}">login</td>
                <td th:text="${usuario.perfil.descricao}">Perfil</td>
                <td class="actions">
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}">Editar</a>
                    <a th:href="@{/usuarios/excluir/{id}(id=${usuario.id})}">Excluir</a>
                </td>
            </tr>
            <tr th:if="${usuarios.empty}">
                <td colspan="4" class="empty">Nenhum usuario cadastrado.</td>
            </tr>
            </tbody>
        </table>
    </section>

    <div class="pagination">
        <a th:if="${usuarios.hasPrevious()}" th:href="@{/usuarios(page=${usuarios.number - 1})}">Anterior</a>
        <span th:text="${usuarios.number + 1} + ' / ' + ${usuarios.totalPages == 0 ? 1 : usuarios.totalPages}">1 / 1</span>
        <a th:if="${usuarios.hasNext()}" th:href="@{/usuarios(page=${usuarios.number + 1})}">Proxima</a>
    </div>
</main>
</body>
</html>
