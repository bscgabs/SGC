<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Usuario')}"></head>
<body>
<header th:replace="~{fragments/layout :: menu}"></header>

<main class="page narrow">
    <div class="page-title">
        <div>
            <h1 th:text="${usuario.id == null ? 'Novo usuario' : 'Editar usuario'}">Usuario</h1>
        </div>
    </div>

    <form th:action="@{/usuarios}" th:object="${usuario}" method="post" class="form-panel">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div class="alert" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></div>

        <label>
            Nome
            <input type="text" th:field="*{nome}" required>
            <span class="field-error" th:errors="*{nome}"></span>
        </label>

        <div class="two-columns">
            <label>
                Login
                <input type="text" th:field="*{login}" required>
                <span class="field-error" th:errors="*{login}"></span>
            </label>
            <label>
                Perfil
                <select th:field="*{perfil}" required>
                    <option th:each="perfil : ${perfis}" th:value="${perfil}" th:text="${perfil.descricao}"></option>
                </select>
            </label>
        </div>

        <label>
            Senha
            <input type="password" name="novaSenha" autocomplete="new-password" th:required="${usuario.id == null}">
        </label>

        <div class="form-actions">
            <a class="secondary-button" th:href="@{/usuarios}">Cancelar</a>
            <button type="submit" class="primary-button">Salvar</button>
        </div>
    </form>
</main>
</body>
</html>
