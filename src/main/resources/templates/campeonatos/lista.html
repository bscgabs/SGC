<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Campeonatos')}"></head>
<body>
<header th:replace="~{fragments/layout :: menu}"></header>

<main class="page">
    <div class="page-title">
        <div>
            <h1>Campeonatos</h1>
        </div>
        <a class="primary-button" th:href="@{/campeonatos/novo}">Novo campeonato</a>
    </div>

    <section class="table-panel">
        <table>
            <thead>
            <tr>
                <th>Nome</th>
                <th>Inicio</th>
                <th>Fim</th>
                <th>Responsavel</th>
                <th class="actions">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="campeonato : ${campeonatos.content}">
                <td th:text="${campeonato.nome}">Campeonato</td>
                <td th:text="${#temporals.format(campeonato.dataInicio, 'dd/MM/yyyy')}">01/01/2026</td>
                <td th:text="${#temporals.format(campeonato.dataFim, 'dd/MM/yyyy')}">31/12/2026</td>
                <td th:text="${campeonato.responsavel.nome}">Responsavel</td>
                <td class="actions">
                    <a th:href="@{/campeonatos/editar/{id}(id=${campeonato.id})}">Editar</a>
                    <a th:href="@{/relatorios/campeonatos/{id}/pdf(id=${campeonato.id})}" target="_blank">PDF</a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/campeonatos/excluir/{id}(id=${campeonato.id})}">Excluir</a>
                </td>
            </tr>
            <tr th:if="${campeonatos.empty}">
                <td colspan="5" class="empty">Nenhum campeonato cadastrado.</td>
            </tr>
            </tbody>
        </table>
    </section>

    <div class="pagination">
        <a th:if="${campeonatos.hasPrevious()}" th:href="@{/campeonatos(page=${campeonatos.number - 1})}">Anterior</a>
        <span th:text="${campeonatos.number + 1} + ' / ' + ${campeonatos.totalPages == 0 ? 1 : campeonatos.totalPages}">1 / 1</span>
        <a th:if="${campeonatos.hasNext()}" th:href="@{/campeonatos(page=${campeonatos.number + 1})}">Proxima</a>
    </div>
</main>
</body>
</html>
