<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Campeonato')}"></head>
<body>
<header th:replace="~{fragments/layout :: menu}"></header>

<main class="page narrow">
    <div class="page-title">
        <div>
            <h1 th:text="${campeonato.id == null ? 'Novo campeonato' : 'Editar campeonato'}">Campeonato</h1>
        </div>
    </div>

    <form th:action="@{/campeonatos}" th:object="${campeonato}" method="post" class="form-panel">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div class="alert" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></div>

        <label>
            Nome
            <input type="text" th:field="*{nome}" required>
            <span class="field-error" th:errors="*{nome}"></span>
        </label>

        <div class="two-columns">
            <label>
                Data de inicio
                <input type="date" th:field="*{dataInicio}" required>
                <span class="field-error" th:errors="*{dataInicio}"></span>
            </label>
            <label>
                Data de fim
                <input type="date" th:field="*{dataFim}" required>
                <span class="field-error" th:errors="*{dataFim}"></span>
            </label>
        </div>

        <div class="form-actions">
            <a class="secondary-button" th:href="@{/campeonatos}">Cancelar</a>
            <button type="submit" class="primary-button">Salvar</button>
        </div>
    </form>
</main>
</body>
</html>
