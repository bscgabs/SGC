<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Equipe')}"></head>
<body>
<header th:replace="~{fragments/layout :: menu}"></header>

<main class="page narrow">
    <div class="page-title">
        <div>
            <h1 th:text="${equipe.id == null ? 'Nova equipe' : 'Editar equipe'}">Equipe</h1>
        </div>
    </div>

    <form th:action="@{/equipes}" th:object="${equipe}" method="post" class="form-panel">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{id}">

        <div class="alert" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></div>

        <label>
            Nome
            <input type="text" th:field="*{nome}" required>
            <span class="field-error" th:errors="*{nome}"></span>
        </label>

        <label>
            Local
            <input type="text" th:field="*{local}" required>
            <span class="field-error" th:errors="*{local}"></span>
        </label>

        <div class="form-actions">
            <a class="secondary-button" th:href="@{/equipes}">Cancelar</a>
            <button type="submit" class="primary-button">Salvar</button>
        </div>
    </form>
</main>

</body>
</html>
