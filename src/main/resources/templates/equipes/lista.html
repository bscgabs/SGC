<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Equipes')}"></head>
<body>
<header th:replace="~{fragments/layout :: menu}"></header>

<main class="page">
    <div class="page-title">
        <div>
            <h1>Equipes</h1>
        </div>
        <a class="primary-button" th:href="@{/equipes/novo}">Nova equipe</a>
    </div>

    <section class="table-panel">
        <table>
            <thead>
            <tr>
                <th>Nome</th>
                <th>Local</th>
                <th class="actions">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="equipe : ${equipes.content}">
                <td th:text="${equipe.nome}">Equipe</td>
                <td th:text="${equipe.local}">Local</td>
                <td class="actions">
                    <a th:href="@{/equipes/editar/{id}(id=${equipe.id})}">Editar</a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/equipes/excluir/{id}(id=${equipe.id})}">Excluir</a>
                </td>
            </tr>
            <tr th:if="${equipes.empty}">
                <td colspan="3" class="empty">Nenhuma equipe cadastrada.</td>
            </tr>
            </tbody>
        </table>
    </section>

    <div class="pagination">
        <a th:if="${equipes.hasPrevious()}" th:href="@{/equipes(page=${equipes.number - 1})}">Anterior</a>
        <span th:text="${equipes.number + 1} + ' / ' + ${equipes.totalPages == 0 ? 1 : equipes.totalPages}">1 / 1</span>
        <a th:if="${equipes.hasNext()}" th:href="@{/equipes(page=${equipes.number + 1})}">Proxima</a>
    </div>
</main>
</body>
</html>
