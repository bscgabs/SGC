<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gerenciamento de Campeonatos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel">
        <h1>Acesso ao sistema</h1>

        <div class="alert success" th:if="${param.logout}">Sessao encerrada.</div>
        <div class="alert" th:if="${param.error}">Login ou senha invalidos.</div>

        <form th:action="@{/login}" method="post" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                Login
                <input type="text" name="username" autocomplete="username" required autofocus>
            </label>

            <label>
                Senha
                <input type="password" name="password" autocomplete="current-password" required>
            </label>

            <button type="submit" class="primary-button">Entrar</button>
        </form>
    </section>
</main>
</body>
</html>
