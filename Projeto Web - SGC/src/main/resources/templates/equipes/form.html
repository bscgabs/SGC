<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Equipe</title>
</head>
<body>

<h2>Cadastro de Equipe</h2>

<form th:action="@{/equipes}" th:object="${equipe}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Nome</label>
    <input type="text" th:field="*{nome}">
    <br>

    <label>Local</label>
    <input type="text" th:field="*{local}">
    <br>

    <button type="submit">
        Salvar
    </button>

</form>

</body>
</html>
